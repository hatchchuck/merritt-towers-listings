<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merritt Towers — Active Listings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }
  .site-label { text-align: center; font-size: 11px; letter-spacing: 0.15em; color: #666; padding: 14px 16px 0; text-transform: uppercase; }
  header { background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%); color: white; padding: 24px 20px 18px; text-align: center; }
  .header-icon { font-size: 40px; margin-bottom: 8px; display: block; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
  header h1 span { display: block; font-size: 17px; font-weight: 300; opacity: 0.85; margin-top: 2px; }
  .verified-bar { background: #1e4976; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .verified-text { font-size: 12px; color: rgba(255,255,255,0.65); }
  .verified-text strong { color: rgba(255,255,255,0.9); }
  .stats-strip { display: flex; background: #163354; border-bottom: 1px solid rgba(255,255,255,0.08); overflow-x: auto; }
  .stat { flex: 1; min-width: 75px; padding: 10px 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 700; color: white; line-height: 1; }
  .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }
  .notice { background: #fef3c7; border-left: 3px solid #f59e0b; margin: 12px 14px 0; padding: 10px 14px; font-size: 12px; color: #92400e; line-height: 1.6; border-radius: 8px; display: none; }
  .filters { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filters select { font-size: 13px; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 8px; background: #f8fafc; color: #1a1a2e; outline: none; cursor: pointer; flex: 1; min-width: 110px; }
  .filters select:focus { border-color: #2d6a9f; }
  .bldg-tabs { display: flex; gap: 6px; padding: 10px 14px 0; flex-wrap: wrap; }
  .btab { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; border: 1.5px solid #cbd5e1; background: white; color: #64748b; cursor: pointer; transition: all .15s; }
  .btab.active { background: #1a3a5c; border-color: #1a3a5c; color: white; }
  main { padding: 12px 14px 80px; }
  .count-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; color: #64748b; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
  .card-header { padding: 14px 14px 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .card-price { font-size: 22px; font-weight: 700; color: #1a3a5c; line-height: 1; }
  .card-status { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .s-active { background: #dcfce7; color: #15803d; }
  .s-new { background: #fef9c3; color: #854d0e; }
  .s-reduced { background: #fee2e2; color: #b91c1c; }
  .s-pending { background: #dbeafe; color: #1d4ed8; }
  .card-addr { padding: 5px 14px 0; font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .bldg-pill { font-size: 10px; font-weight: 700; letter-spacing: .04em; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
  .ph1 { background: #dbeafe; color: #1e40af; }
  .ph2 { background: #d1fae5; color: #065f46; }
  .ph3 { background: #ede9fe; color: #5b21b6; }
  .card-meta { padding: 8px 14px; display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: #475569; border-bottom: 1px solid #f1f5f9; }
  .card-desc { padding: 10px 14px; font-size: 12px; color: #475569; line-height: 1.65; }
  .card-footer { padding: 6px 14px 12px; }
  .mls-num { font-size: 11px; color: #94a3b8; background: #f8fafc; padding: 3px 8px; border-radius: 6px; display: inline-block; }
  .state-box { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: #64748b; }
  .spinner { width: 32px; height: 32px; margin: 0 auto 12px; border: 3px solid #e2e8f0; border-top-color: #2d6a9f; border-radius: 50%; animation: spin .75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .quick-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  .quick-link { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; color: #475569; text-decoration: none; transition: all .15s; white-space: nowrap; }
  .quick-link:hover { border-color: #2d6a9f; color: #2d6a9f; }
  footer { text-align: center; padding: 20px 16px; font-size: 12px; color: #94a3b8; line-height: 1.8; border-top: 1px solid #e2e8f0; background: white; margin-top: 16px; }
  footer a { color: #2d6a9f; text-decoration: none; }
  footer strong { color: #475569; }
  @media (max-width: 480px) { header h1 { font-size: 20px; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="site-label">Merritt Island, FL · 200-300 S. Sykes Creek Pkwy</div>

<header>
  <span class="header-icon">🏢</span>
  <h1>Merritt Towers <span>Condos For Sale</span></h1>
</header>

<div class="verified-bar">
  <div class="verified-text">🕐 Last updated: <strong id="last-updated">Loading…</strong></div>
</div>
